<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>Task App - 統合プロジェクト</title>
  <link rel="stylesheet" href="/static/css/style.css?v=20260704">
</head>
<body>
  <header class="app-header">
    <h1>Task App</h1>
    <nav>
      <a href="/">プロジェクト</a>
      <a href="/portfolios">統合</a>
      <a href="/todo">ToDo</a>
      <a href="/members">メンバー</a>
      <a href="/templates">テンプレート</a>
    </nav>
  </header>

  <main class="container container--wide">
    <div class="toolbar">
      <div class="toolbar__left">
        <a href="/portfolios" class="btn btn--sm">← 一覧</a>
        <h2 id="portfolio-title" style="margin:0">読み込み中...</h2>
        <span class="pf-readonly-badge">閲覧専用</span>
      </div>
      <div class="toolbar__right">
        <button class="btn btn--sm" id="btn-export-png" title="統合ガントをPNG画像で保存">PNG出力</button>
      </div>
    </div>

    <div class="card" style="margin-bottom:8px;padding:10px 16px;">
      <div class="gantt-controls">
        <label>ズーム
          <select id="zoom-select">
            <option value="day">日</option>
            <option value="week">週</option>
            <option value="month">月</option>
          </select>
        </label>
        <span style="font-size:12px;color:var(--color-text-muted);">
          バー = 各プロジェクトの最早開始日〜最遅終了日 ／
          進捗点 = 最も遅れているタスク基準（基準日は今日）／
          バークリックで各プロジェクトのガントへ
        </span>
        <span id="base-date-label" style="margin-left:auto;color:var(--color-text-muted);font-size:12px;"></span>
      </div>
    </div>

    <div id="skipped-note"></div>

    <div class="gantt-layout">
      <div class="gantt-task-pane">
        <div class="gantt-task-pane__header">
          <div>プロジェクト</div>
          <div>状態</div>
          <div>進捗</div>
        </div>
        <div id="task-rows"></div>
      </div>
      <div class="gantt-chart-pane" id="gantt-chart"></div>
    </div>
  </main>

  <script src="/static/js/util.js?v=20260704"></script>
  <script src="/static/js/api.js?v=20260704"></script>
  <script src="/static/js/gantt.js?v=20260704"></script>
  <script src="/static/js/portfolio_view.js?v=20260704"></script>
</body>
</html>
